function fmt(n){if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+"M";if(Math.abs(n)>=1e3)return Math.round(n/1e3)+"K";return n.toString();}

// ═══════════════════════════════════════════════════
// CANVAS EQUITY CHART (matches existing presentation style)
// ═══════════════════════════════════════════════════
function CanvasEquity({data,height=300}){
  const canvasRef=React.useRef(null);
  const containerRef=React.useRef(null);
  const[hover,setHover]=React.useState(null);
  const[tipPos,setTipPos]=React.useState({x:0,y:0});

  const draw=React.useCallback(()=>{
    const c=canvasRef.current;if(!c)return;
    const x=c.getContext("2d");
    const dpr=window.devicePixelRatio||1;
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=height*dpr;
    x.scale(dpr,dpr);
    const W=rect.width,H=height;

    const mn=Math.min(...data.concat([0]));
    const mx=Math.max(...data);
    const rng=mx-mn||1;
    const pad={t:20,r:80,b:30,l:10};
    const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

    // Grid lines + labels
    x.strokeStyle="#182030";x.lineWidth=0.5;
    for(let i=0;i<=5;i++){
      const y=pad.t+(ch/5)*i;
      x.beginPath();x.moveTo(pad.l,y);x.lineTo(W-pad.r,y);x.stroke();
      const v=mx-(rng/5)*i;
      x.fillStyle="#3d5570";x.font="10px DM Mono";x.textAlign="right";
      x.fillText("$"+fmt(v),W-pad.r+70,y+4);
    }

    // Zero line
    const zy=pad.t+((mx-0)/rng)*ch;
    x.strokeStyle="#3d5570";x.setLineDash([4,4]);
    x.beginPath();x.moveTo(pad.l,zy);x.lineTo(W-pad.r,zy);x.stroke();
    x.setLineDash([]);

    // Gradient fill
    x.beginPath();
    for(let i=0;i<data.length;i++){
      const px=pad.l+(i/(data.length-1))*cw;
      const py=pad.t+((mx-data[i])/rng)*ch;
      if(i===0)x.moveTo(px,py);else x.lineTo(px,py);
    }
    x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
    const g=x.createLinearGradient(0,pad.t,0,H);
    g.addColorStop(0,"rgba(0,232,162,0.12)");g.addColorStop(1,"rgba(0,232,162,0)");
    x.fillStyle=g;x.fill();

    // Main line
    x.beginPath();
    for(let i=0;i<data.length;i++){
      const px=pad.l+(i/(data.length-1))*cw;
      const py=pad.t+((mx-data[i])/rng)*ch;
      if(i===0)x.moveTo(px,py);else x.lineTo(px,py);
    }
    x.strokeStyle="#00E8A2";x.lineWidth=2;x.stroke();

    // Hover crosshair + dot
    if(hover!==null&&hover>=0&&hover<data.length){
      const hx=pad.l+(hover/(data.length-1))*cw;
      const hy=pad.t+((mx-data[hover])/rng)*ch;
      x.strokeStyle="rgba(0,232,162,0.3)";x.lineWidth=1;x.setLineDash([3,3]);
      x.beginPath();x.moveTo(hx,pad.t);x.lineTo(hx,pad.t+ch);x.stroke();
      x.setLineDash([]);
      // Outer glow
      x.beginPath();x.arc(hx,hy,6,0,Math.PI*2);x.fillStyle="rgba(0,232,162,0.15)";x.fill();
      // Dot
      x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.fillStyle="#00E8A2";x.fill();
      x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.strokeStyle="#04080D";x.lineWidth=1.5;x.stroke();
    }

    // End label
    const last=data[data.length-1];
    const ly=pad.t+((mx-last)/rng)*ch;
    x.fillStyle="#00E8A2";x.font="bold 13px DM Mono";x.textAlign="right";
    x.fillText(fmtD(last),W-pad.r-6,ly-10);
  },[data,height,hover]);

  React.useEffect(()=>{draw();},[draw]);
  React.useEffect(()=>{const h=()=>draw();window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[draw]);

  const onMove=React.useCallback(e=>{
    const c=canvasRef.current;if(!c)return;
    const rect=c.getBoundingClientRect();
    const pad={l:10,r:80};
    const cw=rect.width-pad.l-pad.r;
    const rx=e.clientX-rect.left-pad.l;
    const idx=Math.round((rx/cw)*(data.length-1));
    if(idx>=0&&idx<data.length){setHover(idx);setTipPos({x:e.clientX-rect.left,y:e.clientY-rect.top});}
    else setHover(null);
  },[data.length]);

  return(
    <div ref={containerRef} style={{position:"relative"}}>
      <canvas ref={canvasRef} style={{width:"100%",height,cursor:"crosshair",display:"block"}}
        onMouseMove={onMove} onMouseLeave={()=>setHover(null)}/>
      {hover!==null&&(
        <div style={{position:"absolute",left:Math.min(tipPos.x,containerRef.current?.offsetWidth-180||300),top:8,pointerEvents:"none",zIndex:10}}>
          <div style={{background:C.sf2,border:`1px solid ${C.bd}`,borderRadius:8,padding:"8px 14px",boxShadow:`0 8px 24px ${C.bg}DD`}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>{fmtM(hover)}</div>
            <div style={{fontSize:18,fontWeight:700,color:data[hover]>=0?C.green:C.red,marginTop:2}}>{fmtD(data[hover])}</div>
            {hover>0&&(<div style={{fontFamily:C.mono,fontSize:10,color:(data[hover]-data[hover-1])>=0?C.green:C.red,marginTop:2}}>{(data[hover]-data[hover-1])>=0?"+":""}{fmtD(data[hover]-data[hover-1])} this month</div>)}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",padding:"8px 10px 0 10px",fontFamily:C.mono,fontSize:9,color:C.muted}}>
        <span>Mar 2021</span><span>2022</span><span>2023</span><span>2024</span><span>2025</span><span>Mar 2026</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// MONTHLY BARS WITH HOVER
// ═══════════════════════════════════════════════════
function MonthlyBars({data}){
  const vals=Object.values(data),keys=Object.keys(data),max=Math.max(...vals.map(Math.abs));
  const[h,setH]=React.useState(null);
  return(
    <div style={{position:"relative"}}>
      {h!==null&&(<div style={{position:"absolute",top:-44,left:`${(h/vals.length)*100}%`,transform:"translateX(-50%)",background:C.sf2,border:`1px solid ${C.bd}`,borderRadius:6,padding:"6px 12px",whiteSpace:"nowrap",zIndex:10,boxShadow:`0 4px 16px ${C.bg}CC`}}><span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>{keys[h]} </span><span style={{fontFamily:C.mono,fontSize:12,fontWeight:600,color:vals[h]>=0?C.green:C.red}}>{vals[h]>=0?"+":""}${vals[h].toLocaleString()}</span></div>)}
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:130,padding:"0 2px"}}>
        {vals.map((v,i)=>{const ht=Math.abs(v)/max*110;return(
          <div key={i} onMouseEnter={()=>setH(i)} onMouseLeave={()=>setH(null)} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",height:"100%",cursor:"crosshair"}}>
            <div style={{height:`${ht}%`,minHeight:2,background:v>=0?(h===i?C.green:`${C.green}90`):(h===i?C.red:`${C.red}90`),borderRadius:"2px 2px 0 0",transition:"all 0.15s",transform:h===i?"scaleY(1.08)":"scaleY(1)",transformOrigin:"bottom"}}/>
          </div>);})}
      </div>
    </div>
  );
}

function AnimNum({value,prefix="",suffix="",color=C.white,size=28}){
  const[d,setD]=React.useState(0);const r=React.useRef(null);const[v,setV]=React.useState(false);
  React.useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:0.3});if(r.current)o.observe(r.current);return()=>o.disconnect();},[]);
  React.useEffect(()=>{if(!v)return;const dur=1200,s=performance.now();const t=n=>{const p=Math.min((n-s)/dur,1);setD(Math.round(value*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(t);};requestAnimationFrame(t);},[v,value]);
  return <span ref={r} style={{fontSize:size,fontWeight:700,color,letterSpacing:"-1px"}}>{prefix}{d.toLocaleString()}{suffix}</span>;
}

function Stat({label,children,sub,delay=0}){
  return(<div style={{background:C.sf,border:`1px solid ${C.bd}`,borderRadius:14,padding:"22px 26px",animation:`fadeUp 0.6s ease ${delay}s both`,transition:"border-color 0.3s,transform 0.3s"}} onMouseOver={e=>{e.currentTarget.style.borderColor=C.green+"40";e.currentTarget.style.transform="translateY(-2px)"}} onMouseOut={e=>{e.currentTarget.style.borderColor=C.bd;e.currentTarget.style.transform="none"}}>
    <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,letterSpacing:1.5,marginBottom:10,textTransform:"uppercase"}}>{label}</div>{children}{sub&&<div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginTop:6}}>{sub}</div>}
  </div>);
}

    {page==="home"&&<Homepage onLogin={()=>setPage("login")}/>}
    {page==="login"&&<LoginPage onLogin={e=>{setUe(e);setPage("dashboard")}} onBack={()=>setPage("home")}/>}
    {page==="dashboard"&&<Dashboard email={ue} onLogout={()=>{setUe("");setPage("home")}}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
