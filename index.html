function drawEqChart(){
  var c=document.getElementById('eqChart');if(!c)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
  var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=300*dpr;x.scale(dpr,dpr);
  var W=r.width,H=300,data=D.eq;
  var mn=Math.min.apply(null,data.concat([0])),mx=Math.max.apply(null,data),rng=mx-mn||1;
  var pad={t:20,r:80,b:30,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  x.strokeStyle='#182030';x.lineWidth=0.5;
  for(var i=0;i<=5;i++){var y=pad.t+(ch/5)*i;x.beginPath();x.moveTo(pad.l,y);x.lineTo(W-pad.r,y);x.stroke();var v=mx-(rng/5)*i;x.fillStyle='#3d5570';x.font='10px DM Mono';x.textAlign='right';x.fillText('$'+fmt(v),W-pad.r+70,y+4);}
  var zy=pad.t+((mx-0)/rng)*ch;x.strokeStyle='#3d5570';x.setLineDash([4,4]);x.beginPath();x.moveTo(pad.l,zy);x.lineTo(W-pad.r,zy);x.stroke();x.setLineDash([]);
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
  var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();
  var last=data[data.length-1],ly=pad.t+((mx-last)/rng)*ch;
  x.fillStyle='#00E8A2';x.font='bold 13px DM Mono';x.textAlign='right';x.fillText(fmtD(last),W-pad.r-6,ly-10);
  c.onmousemove=function(e){
    var rect=c.getBoundingClientRect();var rx=e.clientX-rect.left-pad.l;
    var idx=Math.round((rx/cw)*(data.length-1));
    if(idx<0||idx>=data.length){document.getElementById('eqTip').style.display='none';drawEqChart();return;}
    drawEqChart();
    var hx=pad.l+(idx/(data.length-1))*cw;var hy=pad.t+((mx-data[idx])/rng)*ch;
    x.strokeStyle='rgba(0,232,162,0.3)';x.lineWidth=1;x.setLineDash([3,3]);
    x.beginPath();x.moveTo(hx,pad.t);x.lineTo(hx,pad.t+ch);x.stroke();x.setLineDash([]);
    x.beginPath();x.arc(hx,hy,6,0,Math.PI*2);x.fillStyle='rgba(0,232,162,0.15)';x.fill();
    x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.fillStyle='#00E8A2';x.fill();
    x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.strokeStyle='#04080D';x.lineWidth=1.5;x.stroke();
    var tip=document.getElementById('eqTip');tip.style.display='block';
    tip.style.left=Math.min(e.clientX-rect.left,rect.width-180)+'px';
    document.getElementById('tipMonth').textContent=fmtM(idx);
    document.getElementById('tipVal').textContent=fmtD(data[idx]);
    document.getElementById('tipVal').style.color=data[idx]>=0?'#00E8A2':'#FF4466';
    if(idx>0){var chg=data[idx]-data[idx-1];document.getElementById('tipChg').textContent=(chg>=0?'+':'')+fmtD(chg)+' this month';document.getElementById('tipChg').style.color=chg>=0?'#00E8A2':'#FF4466';document.getElementById('tipChg').style.display='block';}else{document.getElementById('tipChg').style.display='none';}
  };
  c.onmouseleave=function(){document.getElementById('eqTip').style.display='none';drawEqChart();};
  c.ontouchmove=c.onmousemove;
}

function buildMonthlyBars(){

}

}
function hideMbTip(){document.getElementById('mbTip').style.display='none';}

function animateNumbers(){
  var dur=1200,s=performance.now();
  function tick(now){
    var t=Math.min((now-s)/dur,1);var ease=1-Math.pow(1-t,3);
    var el1=document.getElementById('animPnl');if(el1)el1.textContent='$'+Math.round(1767680*ease).toLocaleString();
    var el2=document.getElementById('animWR');if(el2)el2.textContent=Math.round(72*ease)+'%';
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function toggleTradeLog(){

  var body=document.getElementById('tlogBody');
  var arrow=document.getElementById('tlogArrow');
  var toggle=document.getElementById('tlogToggle');
  if(body.classList.contains('open')){
    body.classList.remove('open');arrow.classList.remove('open');toggle.classList.remove('open');
  }else{
    body.classList.add('open');arrow.classList.add('open');toggle.classList.add('open');
    var rows=document.getElementById('tlogRows');
    if(!rows.innerHTML){
      var h='';
      for(var i=TRADES.length-1;i>=0;i--){
        var t=TRADES[i];
        var pc=t.p>0?'var(--green)':'var(--red)';
        var rc=t.r==='TP'?'background:rgba(0,232,162,.08);color:var(--green)':'background:rgba(255,68,102,.08);color:var(--red)';
        h+='<tr><td style="color:var(--text)">'+t.d+'</td><td style="color:var(--muted)">'+t.t+'</td><td style="color:var(--cyan)">'+t.s+'</td><td style="color:var(--green)">LONG</td><td style="color:var(--white)">$'+t.e.toFixed(2)+'</td><td style="color:var(--muted)">$'+t.tp.toFixed(2)+'</td><td style="color:var(--muted)">$'+t.sl.toFixed(2)+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;'+rc+'">'+t.r+'</span></td><td style="color:'+pc+';font-weight:600">'+(t.p>0?'+':'')+t.p+'</td><td style="color:var(--muted)">'+t.x+'</td></tr>';
      }
      rows.innerHTML=h;
      document.getElementById('tlogCount').textContent='Showing '+TRADES.length+' most recent trades (Jan-Feb 2026) \u00b7 Full history available upon request';
    }
  }
}

var API = 'http://68.183.97.227:8000'; // Your Droplet IP
var SESSION = {token: null, investor: null};

function getToken(){return localStorage.getItem('nq_token');}
function setToken(t){localStorage.setItem('nq_token',t);}
function clearToken(){localStorage.removeItem('nq_token');SESSION.token=null;SESSION.investor=null;}

async function apiCall(method, path, body){
  var opts = {method: method, headers: {'Content-Type':'application/json'}};
  var token = getToken();
  if(token) opts.headers['Authorization'] = 'Bearer ' + token;
  if(body) opts.body = JSON.stringify(body);
  var res = await fetch(API + path, opts);
  var data = await res.json();
  if(!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

function showError(msg){
  var el = document.getElementById('loginError');
  if(el){el.textContent=msg;el.style.display='block';}
}
function hideError(){
  var el = document.getElementById('loginError');
  if(el) el.style.display='none';
}

function buildLogin(){
var h='<div class="login-wrap"><div class="login-box">';
h+='<div class="login-logo" onclick="showPage(\'homePage\')"><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px"><div class="logo-dot"></div><span style="font-size:20px;font-weight:800;color:var(--white)">NQ ALPHA</span></div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px">INVESTOR PORTAL</div></div>';
h+='<div class="login-form"><div class="login-toggle"><button id="ltLogin" class="active" onclick="toggleLogin(\'login\')">LOG IN</button><button id="ltSignup" class="inactive" onclick="toggleLogin(\'signup\')">SIGN UP</button></div>';
h+='<div id="signupFields" style="display:none"><div class="field"><label>FULL NAME</label><input id="regName" placeholder="John Smith"></div><div class="field"><label>PHONE</label><input id="regPhone" placeholder="+1 (555) 000-0000"></div></div>';
h+='<div class="field"><label>EMAIL</label><input id="regEmail" type="email" placeholder="investor@email.com"></div>';
h+='<div class="field" style="margin-bottom:8px"><label>PASSWORD</label><input id="regPassword" type="password" placeholder="••••••••"></div>';
h+='<div id="loginError" style="display:none;color:var(--red);font-family:var(--mono);font-size:11px;margin-bottom:12px;padding:8px 12px;background:rgba(255,68,102,.08);border-radius:6px;border:1px solid rgba(255,68,102,.2)"></div>';
h+='<button class="login-submit" id="loginBtn" onclick="doLogin()">Log In</button></div>';
h+='<div class="login-back" onclick="showPage(\'homePage\')">← Back to Homepage</div>';
h+='</div></div>';
document.getElementById('loginPage').innerHTML=h;

// Auto-login if token exists
var token = getToken();
if(token){
  apiCall('GET','/investor/profile').then(function(data){
    SESSION.investor = data;
    showPage('dashPage'); buildDash(data.email);
  }).catch(function(){clearToken();});
}
}

function toggleLogin(mode){
document.getElementById('ltLogin').className=mode==='login'?'active':'inactive';
document.getElementById('ltSignup').className=mode==='signup'?'active':'inactive';
document.getElementById('signupFields').style.display=mode==='signup'?'block':'none';
document.getElementById('loginBtn').textContent=mode==='login'?'Log In':'Create Account';
hideError();
}

async function doLogin(){
var btn = document.getElementById('loginBtn');
var mode = btn.textContent === 'Log In' ? 'login' : 'signup';
var email = (document.getElementById('regEmail').value||'').trim();
var password = document.getElementById('regPassword').value||'';
hideError();

if(!email || !password){showError('Please enter your email and password.');return;}
btn.textContent = 'Please wait...'; btn.disabled = true;

try {
  var data;
  if(mode === 'login'){
    data = await apiCall('POST','/auth/login',{email:email,password:password});
  } else {
    var name = (document.getElementById('regName')||{}).value||'';
    var phone = (document.getElementById('regPhone')||{}).value||'';
    data = await apiCall('POST','/auth/signup',{email:email,password:password,name:name,phone:phone});
  }
  setToken(data.token);
  var profile = await apiCall('GET','/investor/profile');
  SESSION.investor = profile;
  showPage('dashPage'); buildDash(profile.email);
} catch(e){
  showError(e.message||'Something went wrong. Please try again.');
  btn.textContent = mode==='login'?'Log In':'Create Account';
  btn.disabled = false;
}
}

function calcEffective(pos){if(!pos||!pos.mode)return '—';if(pos.mode==='fixed')return pos.fixed_contracts+' contracts';return Math.max(1,Math.round(8*(pos.multiplier||0.25)))+' contracts ('+(Math.round((pos.multiplier||0.25)*100))+'%)';}

function buildLogin(){
var h='<div class="login-wrap"><div class="login-box">';
h+='<div class="login-logo" onclick="showPage(\'homePage\')"><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px"><div class="logo-dot"></div><span style="font-size:20px;font-weight:800;color:var(--white)">NQ ALPHA</span></div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px">INVESTOR PORTAL</div></div>';
h+='<div class="login-form"><div class="login-toggle"><button id="ltLogin" class="active" onclick="toggleLogin(\'login\')">LOG IN</button><button id="ltSignup" class="inactive" onclick="toggleLogin(\'signup\')">SIGN UP</button></div>';
h+='<div id="signupFields" style="display:none"><div class="field"><label>FULL NAME</label><input id="regName" placeholder="John Smith"></div><div class="field"><label>PHONE</label><input id="regPhone" placeholder="+1 (555) 000-0000"></div></div>';
h+='<div class="field"><label>EMAIL</label><input id="regEmail" type="email" placeholder="investor@email.com"></div>';
h+='<div class="field" style="margin-bottom:8px"><label>PASSWORD</label><input id="regPassword" type="password" placeholder="••••••••"></div>';
h+='<div id="loginError" style="display:none;color:var(--red);font-family:var(--mono);font-size:11px;margin-bottom:12px;padding:8px 12px;background:rgba(255,68,102,.08);border-radius:6px;border:1px solid rgba(255,68,102,.2)"></div>';
h+='<button class="login-submit" id="loginBtn" onclick="doLogin()">Log In</button></div>';
h+='<div class="login-back" onclick="showPage(\'homePage\')">← Back to Homepage</div>';
h+='</div></div>';
document.getElementById('loginPage').innerHTML=h;
var token=getToken();
if(token){apiCall('GET','/investor/profile').then(function(data){SESSION.investor=data;showPage('dashPage');buildDash(data.email);}).catch(function(){clearToken();});}
}
function toggleLogin(mode){
document.getElementById('ltLogin').className=mode==='login'?'active':'inactive';
document.getElementById('ltSignup').className=mode==='signup'?'active':'inactive';
document.getElementById('signupFields').style.display=mode==='signup'?'block':'none';
document.getElementById('loginBtn').textContent=mode==='login'?'Log In':'Create Account';
hideLoginError();
}
async function doLogin(){
var btn=document.getElementById('loginBtn');
var isSignup=btn.textContent==='Create Account';
var email=(document.getElementById('regEmail').value||'').trim();
var password=document.getElementById('regPassword').value||'';
hideLoginError();
if(!email||!password){showLoginError('Please enter your email and password.');return;}
btn.textContent='Please wait...';btn.disabled=true;
try{
  var data;
  if(isSignup){var name=(document.getElementById('regName')||{}).value||'';var phone=(document.getElementById('regPhone')||{}).value||'';data=await apiCall('POST','/auth/signup',{email:email,password:password,name:name,phone:phone});}
  else{data=await apiCall('POST','/auth/login',{email:email,password:password});}
  setToken(data.token);
  var profile=await apiCall('GET','/investor/profile');
  SESSION.investor=profile;
  showPage('dashPage');buildDash(profile.email);
}catch(e){showLoginError(e.message||'Something went wrong.');btn.textContent=isSignup?'Create Account':'Log In';btn.disabled=false;}
}

function drawDashEq(){
var c=document.getElementById('dashEq');if(!c)return;
var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=180*dpr;x.scale(dpr,dpr);
var W=r.width,H=180,data=D.eq;
var mn=Math.min.apply(null,data.concat([0])),mx=Math.max.apply(null,data),rng=mx-mn||1;
var pad={t:10,r:10,b:10,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();
}

var ADMIN_KEY_STORED = null;

function buildAdminLogin(){
  var h='<div class="login-wrap"><div class="login-box">';
  h+='<div class="login-logo" onclick="showPage(\'homePage\')"><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px"><div class="logo-dot" style="background:var(--gold);box-shadow:0 0 14px rgba(240,192,64,.4)"></div><span style="font-size:20px;font-weight:800;color:var(--white)">NQ ALPHA</span></div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px">ADMIN PORTAL</div></div>';
  h+='<div class="login-form">';
  h+='<div style="font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:20px;text-align:center">ADMINISTRATOR ACCESS</div>';
  h+='<div class="field"><label>ADMIN PASSWORD</label><input id="adminPass" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doAdminLogin()"></div>';
  h+='<div id="adminLoginErr" style="display:none;color:var(--red);font-family:var(--mono);font-size:11px;margin-bottom:12px;padding:8px 12px;background:rgba(255,68,102,.08);border-radius:6px"></div>';
  h+='<button onclick="doAdminLogin()" style="width:100%;padding:14px;background:var(--gold);border:none;border-radius:10px;color:#04080D;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)">Sign In as Admin</button>';
  h+='</div>';
  h+='<div class="login-back" onclick="showPage(\'homePage\')">← Back to Homepage</div>';
  h+='</div></div>';
  document.getElementById('adminPage').innerHTML=h;
}

async function doAdminLogin(){
  var pass=document.getElementById('adminPass').value;
  var err=document.getElementById('adminLoginErr');
  err.style.display='none';
  if(!pass){err.textContent='Enter your admin password.';err.style.display='block';return;}
  var btn=event.target||document.querySelector('#adminPage button');
  btn.textContent='Signing in...';btn.disabled=true;
  try{
    var data=await fetch(API+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})}).then(r=>r.json());
    if(data.token){
      ADMIN_KEY_STORED=data.token;
      localStorage.setItem('nq_admin_token',data.token);
      await buildAdminDash();
    } else {
      err.textContent='Invalid password.';err.style.display='block';
    }
  }catch(e){err.textContent='Invalid password.';err.style.display='block';}
  btn.textContent='Sign In as Admin';btn.disabled=false;
}

async function adminApi(method,path,body){
  var token=ADMIN_KEY_STORED||localStorage.getItem('nq_admin_token');
  var opts={method:method,headers:{'Content-Type':'application/json','x-admin-key':token}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(API+path,opts);
  var data=await res.json();
  if(!res.ok)throw new Error(data.detail||'Request failed');
  return data;
}

function renderInvestorTable(investors, mode){
  if(!investors.length) return '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:40px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px">No investors yet</div>';
  var h='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden">';
  h+='<table><thead><tr>';
  h+='<th>ID</th><th>Name</th><th>Email</th><th>Joined</th><th>Status</th><th>Tradovate</th><th>Position</th><th>P&L</th><th>Actions</th>';
  h+='</tr></thead><tbody>';
  investors.forEach(function(inv){
    var joined=(inv.created_at||'').split('T')[0];
    var approved=inv.is_approved;
    var connected=inv.is_connected;
    var pnl=inv.stats?inv.stats.total_pnl:0;
    var pos=inv.mode==='fixed'?inv.fixed_contracts+'ct fixed':Math.max(1,Math.round(8*(inv.multiplier||0.25)))+'ct ('+(Math.round((inv.multiplier||0.25)*100))+'%)';
    h+='<tr>';
    h+='<td style="color:var(--muted)">#'+inv.id+'</td>';
    h+='<td style="color:var(--white);font-weight:600">'+(inv.name||'—')+'</td>';
    h+='<td style="color:var(--text)">'+inv.email+'</td>';
    h+='<td style="color:var(--muted)">'+joined+'</td>';
    h+='<td><span style="padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;'+(approved?'background:rgba(0,232,162,.08);color:var(--green)':'background:rgba(240,192,64,.08);color:var(--gold)')+'">'+( approved?'APPROVED':'PENDING')+'</span></td>';
    h+='<td><span style="padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;'+(connected?'background:rgba(0,196,255,.08);color:var(--cyan)':'background:rgba(64,80,96,.15);color:var(--muted)')+'">'+( connected?'CONNECTED':'NOT CONNECTED')+'</span></td>';
    h+='<td style="color:var(--text);font-family:var(--mono);font-size:11px">'+pos+'</td>';
    h+='<td style="color:'+(pnl>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(pnl>=0?'+':'')+fmtD(pnl)+'</td>';
    h+='<td><div style="display:flex;gap:6px">';
    if(!approved){
      h+='<button onclick="adminAction(\'approve\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 14px;background:var(--green);border:none;border-radius:6px;color:var(--bg);font-weight:700;cursor:pointer">APPROVE</button>';
    } else {
      h+='<button onclick="adminAction(\'revoke\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 14px;background:transparent;border:1px solid rgba(255,68,102,.25);border-radius:6px;color:var(--red);cursor:pointer">REVOKE</button>';
    }
    h+='<button onclick="adminAction(\'delete\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 10px;background:transparent;border:1px solid var(--bd);border-radius:6px;color:var(--muted);cursor:pointer">✕</button>';
    h+='</div></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

async function adminAction(action, investorId){
  if(action==='delete' && !confirm('Permanently delete this investor? This cannot be undone.')) return;
  if(action==='revoke' && !confirm('Revoke this investor\'s access?')) return;
  try{
    if(action==='approve') await adminApi('POST','/admin/approve/'+investorId);
    else if(action==='revoke') await adminApi('POST','/admin/revoke/'+investorId);
    else if(action==='delete') await adminApi('DELETE','/admin/investor/'+investorId);
    await renderAdminContent();
  }catch(e){alert('Error: '+e.message);}
}
