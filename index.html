<style>
:root{--bg:#04080D;--sf:#0A1018;--sf2:#0E1620;--bd:#162030;--green:#00E8A2;--cyan:#00C4FF;--gold:#F0C040;--red:#FF4466;--text:#B8C8D8;--muted:#405060;--white:#F0F4F8;--font:'Outfit',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}

body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-text-size-adjust:100%;}
::selection{background:rgba(0,232,162,.2);color:var(--white);}
input::placeholder{color:var(--muted);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes mnqGlow{0%,100%{box-shadow:0 0 20px rgba(0,196,255,.08),0 0 40px rgba(0,196,255,.03),inset 0 0 30px rgba(0,196,255,.02)}50%{box-shadow:0 0 35px rgba(0,196,255,.15),0 0 60px rgba(0,196,255,.06),inset 0 0 40px rgba(0,196,255,.04)}}
@keyframes mesGlow{0%,100%{box-shadow:0 0 20px rgba(0,232,162,.06),0 0 40px rgba(0,232,162,.02)}50%{box-shadow:0 0 30px rgba(0,232,162,.1),0 0 50px rgba(0,232,162,.04)}}
@keyframes borderPulse{0%,100%{border-color:rgba(0,196,255,.2)}50%{border-color:rgba(0,196,255,.4)}}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}25%{transform:translate(10px,-15px)}50%{transform:translate(-5px,-25px)}75%{transform:translate(-15px,-10px)}}
@keyframes heroGlow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.page{display:none;}.page.active{display:block;}

.strat-card{background:linear-gradient(160deg,var(--sf),rgba(14,22,32,.7));border-radius:16px;border:1px solid var(--bd);overflow:hidden;transition:all .3s;position:relative;}.strat-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.3);}.strat-bar{height:3px;}.strat-body{padding:26px 24px 22px;}.strat-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}.strat-icon{font-size:20px;}.strat-name{font-size:20px;font-weight:700;color:var(--white);}.strat-tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;margin-bottom:16px;}.strat-desc{font-size:13px;color:rgba(184,200,216,.75);line-height:1.7;margin-bottom:20px;min-height:80px;}.strat-stats{background:linear-gradient(160deg,var(--sf2),rgba(14,22,32,.5));border:1px solid rgba(22,32,48,.6);border-radius:12px;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}.ss-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;}.ss-val{font-size:18px;font-weight:700;color:var(--white);margin-top:2px;}

.mb-wrap{position:relative;}.mb-tip{position:absolute;top:-44px;transform:translateX(-50%);background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;white-space:nowrap;z-index:10;box-shadow:0 4px 16px rgba(4,8,13,.8);display:none;pointer-events:none;}.mb-row{display:flex;align-items:flex-end;gap:2px;height:130px;padding:0 2px;}.mb-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;cursor:crosshair;}.mb-fill{border-radius:2px 2px 0 0;transition:all .15s;transform-origin:bottom;}.mb-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:10px;}.mb-legend{display:flex;gap:16px;font-family:var(--mono);font-size:10px;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.login-box{width:420px;max-width:100%;animation:fadeUp .4s ease both;}.login-logo{text-align:center;margin-bottom:36px;cursor:pointer;}.login-form{background:linear-gradient(160deg,var(--sf),rgba(14,22,32,.8));border:1px solid var(--bd);border-radius:18px;padding:36px;position:relative;overflow:hidden;}.login-form::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,232,162,.3),rgba(0,196,255,.2),transparent);}.login-toggle{display:flex;gap:0;margin-bottom:32px;background:var(--sf2);border-radius:10px;padding:3px;}.login-toggle button{flex:1;padding:11px 0;border-radius:8px;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:1px;transition:all .2s;}.login-toggle .active{background:var(--bd);color:var(--white);}.login-toggle .inactive{background:transparent;color:var(--muted);}
.field{margin-bottom:16px;}.field label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:6px;}.field input,.field select{width:100%;padding:12px 16px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--white);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s;}.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,196,255,.1);}

function drawEqChart(){
  var c=document.getElementById('eqChart');if(!c)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;

  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
  var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();

function buildMonthlyBars(){
  var row=document.getElementById('mbRow');if(!row)return;
  var vals=Object.values(D.monthly),keys=Object.keys(D.monthly);
  var mx=Math.max.apply(null,vals.map(Math.abs));
  var h='';
  vals.forEach(function(v,i){
    var ht=Math.abs(v)/mx*110;var col=v>=0?'#00E8A2':'#FF4466';
    h+='<div class="mb-bar" onmouseenter="showMbTip('+i+')" onmouseleave="hideMbTip()"><div class="mb-fill" style="height:'+ht+'%;min-height:2px;background:'+col+'90"></div></div>';
  });
  row.innerHTML=h;
}
function showMbTip(i){
  var vals=Object.values(D.monthly),keys=Object.keys(D.monthly);
  var tip=document.getElementById('mbTip');tip.style.display='block';tip.style.left=(i/vals.length*100)+'%';
  var v=vals[i];
  tip.innerHTML='<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">'+keys[i]+' </span><span style="font-family:var(--mono);font-size:12px;font-weight:600;color:'+(v>=0?'var(--green)':'var(--red)')+'">'+(v>=0?'+':'')+fmtD(v)+'</span>';
}
function hideMbTip(){document.getElementById('mbTip').style.display='none';}

function animateNumbers(){
  var dur=1200,s=performance.now();
  function tick(now){
    var t=Math.min((now-s)/dur,1);var ease=1-Math.pow(1-t,3);
    var el1=document.getElementById('animPnl');if(el1)el1.textContent='$'+Math.round(1767680*ease).toLocaleString();
    var el2=document.getElementById('animWR');if(el2)el2.textContent=Math.round(72*ease)+'%';
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function toggleTradeLog(){

  var body=document.getElementById('tlogBody');
  var arrow=document.getElementById('tlogArrow');
  var toggle=document.getElementById('tlogToggle');
  if(body.classList.contains('open')){
    body.classList.remove('open');arrow.classList.remove('open');toggle.classList.remove('open');
  }else{
    body.classList.add('open');arrow.classList.add('open');toggle.classList.add('open');
    var rows=document.getElementById('tlogRows');
    if(!rows.innerHTML){
      var h='';
      for(var i=TRADES.length-1;i>=0;i--){
        var t=TRADES[i];
        var pc=t.p>0?'var(--green)':'var(--red)';
        var rc=t.r==='TP'?'background:rgba(0,232,162,.08);color:var(--green)':'background:rgba(255,68,102,.08);color:var(--red)';
        h+='<tr><td style="color:var(--text)">'+t.d+'</td><td style="color:var(--muted)">'+t.t+'</td><td style="color:var(--cyan)">'+t.s+'</td><td style="color:var(--green)">LONG</td><td style="color:var(--white)">$'+t.e.toFixed(2)+'</td><td style="color:var(--muted)">$'+t.tp.toFixed(2)+'</td><td style="color:var(--muted)">$'+t.sl.toFixed(2)+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;'+rc+'">'+t.r+'</span></td><td style="color:'+pc+';font-weight:600">'+(t.p>0?'+':'')+t.p+'</td><td style="color:var(--muted)">'+t.x+'</td></tr>';
      }
      rows.innerHTML=h;
      document.getElementById('tlogCount').textContent='Showing all '+TRADES.length+' trades from March 2026 \u00b7 Backtest on live config';
    }
  }
}

  // helper for section headers
  function sect(id,num,title){return '<div id="'+id+'" style="margin-bottom:14px;padding-top:24px"><div style="font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:2px;margin-bottom:8px">SECTION '+num+'</div><h2 class="disc-h2" style="font-size:28px;font-weight:800;color:var(--white);letter-spacing:-.5px;margin:0">'+title+'</h2></div>';}

  h+=sect("s2","02","NFA Compliance Rule 2-29(c)(1) — Expanded Hypothetical Performance Disclosure");

  h+=pmono("Hypothetical performance results have many inherent limitations, some of which are described below. No representation is being made that any account will or is likely to achieve profits or losses similar to those shown; in fact, there are frequently sharp differences between hypothetical performance results and the actual results subsequently achieved by any particular trading program. One of the limitations of hypothetical performance results is that they are generally prepared with the benefit of hindsight. In addition, hypothetical trading does not involve financial risk, and no hypothetical trading record can completely account for the impact of financial risk in actual trading. For example, the ability to withstand losses or to adhere to a particular trading program in spite of trading losses are material points which can also adversely affect actual trading results. There are numerous other factors related to the markets in general or to the implementation of any specific trading program which cannot be fully accounted for in the preparation of hypothetical performance results and all of which can adversely affect actual trading results.");

  h+=divider();

  // ─── SECTION 3: CFTC 1.55 ──────────────────────────────────────────────
  h+=sect("s3","03","CFTC Regulation 1.55 — General Risk Disclosure for Futures Trading");
  h+=p("The following risk disclosure language is prescribed by CFTC Regulation 1.55(b) and is the standard statement provided to all customers opening commodity futures accounts in the United States:");
  h+=pmono("The risk of loss in trading commodity futures contracts can be substantial. You should, therefore, carefully consider whether such trading is suitable for you in light of your circumstances and financial resources.");
  h+=p("You should be aware of the following points:");
  h+='<ol style="font-size:14px;color:var(--text);line-height:1.85;padding-left:24px;margin-bottom:16px">';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">Total loss of funds.</strong> You may sustain a total loss of the funds that you deposit with your broker to establish or maintain a position in the commodity futures market, and you may incur losses beyond these amounts. If the market moves against your position, you may be called upon by your broker to deposit a substantial amount of additional margin funds, on short notice, in order to maintain your position. If you do not provide the required funds within the time required by your broker, your position may be liquidated at a loss, and you will be liable for any resulting deficit in your account.</li>';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">No insurance protection.</strong> The funds you deposit with a futures commission merchant for trading futures positions are not protected by insurance in the event of the bankruptcy or insolvency of the futures commission merchant, or in the event your funds are misappropriated.</li>';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">Limited recourse on bankruptcy.</strong> The funds you deposit with a futures commission merchant are generally not guaranteed or insured by a derivatives clearing organization in the event of the bankruptcy or insolvency of the futures commission merchant, or if the futures commission merchant is otherwise unable to refund your funds.</li>';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">Leverage.</strong> The high degree of leverage that is often obtainable in futures trading can work against you as well as for you. The use of leverage can lead to large losses as well as gains.</li>';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">Stop orders may not limit losses.</strong> In some markets, you may find it difficult or impossible to liquidate a position. Placing contingent orders, such as a "stop-loss" or "stop-limit" order, will not necessarily limit your losses to the intended amounts, since market conditions may make it impossible to execute such orders.</li>';
  h+='<li style="margin-bottom:14px"><strong style="color:var(--white)">All strategies carry risk.</strong> All futures positions involve risk, and a "spread" position may not be less risky than an outright "long" or "short" position.</li>';
  h+='</ol>';
  h+=pmono("This brief statement cannot, of course, disclose all the risks and other aspects of the commodity markets.");

  h+=divider();

  // ─── SECTION 4: MATERIAL ASSUMPTIONS ───────────────────────────────────
  h+=sect("s4","04","Material Assumptions Used to Generate Hypothetical Results");
  h+=p("NFA Compliance Rule 2-29(c) and Interpretive Notice 9025 require that all material assumptions used to prepare hypothetical performance results be disclosed. The following describes how the March 2026 results presented on the NQ Alpha homepage were generated:");
  h+='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px 28px;margin-bottom:24px">';
  var assumptions=[["Data source","Databento historical 1-minute MNQ futures OHLCV (open/high/low/close/volume) data for March 1 — March 30, 2026."],["Instrument","Micro E-mini Nasdaq-100 futures (MNQ). Front-month contract switched from MNQH6 to MNQM6 mid-month based on daily volume."],["Bar aggregation","1-minute bars aggregated to 5-minute bars anchored to wall-clock 5-minute boundaries in America/Chicago timezone."],["Strategies tested","Four long-only mean-reversion strategies executed simultaneously on the same instrument: VWAP 3.0σ, VWAP 2.8σ, VWAP 2.5σ (all session-anchored), and SMA 2.5σ (20-bar rolling)."],["Position sizing","Fixed at 8 contracts per trade per strategy. No scaling with account equity. No reinvestment of profits."],["Entry","Long entries triggered when the bar low touched or crossed the lower standard deviation band. Fill price assumed to be the band level itself, not the bar low."],["Exits","Fixed take-profit and stop-loss in points: VWAP 3.0σ = 75pt TP / 65pt SL; VWAP 2.8σ = 60pt TP / 65pt SL; VWAP 2.5σ = 40pt TP / 65pt SL; SMA 2.5σ = 40pt TP / 65pt SL."],["Same-bar exits","If both the take-profit and stop-loss were touched within the same bar, the simulation conservatively assumed the stop-loss was hit first (worst case for the strategy)."],["Concurrency","One open position per strategy at any time. A 3-bar (15-minute) cooldown was enforced after every entry."],["Session windows","VWAP strategies active 17:00 — 16:00 CT with a 120-minute warmup. SMA strategy 24-hour active except during the 16:00 — 17:00 CT CME maintenance window."],["Costs not modeled","Commissions, exchange fees, NFA fees, regulatory fees, slippage, partial fills, broker rejections, financing costs, and bid/ask spread are <strong style=\"color:var(--gold)\">not</strong> included. Real trading would reduce returns."],["Account size","No specific account size was assumed. Margin requirements were not modeled. The 8-contract size implies a notional exposure of approximately $1.9M and a regulatory margin requirement of approximately $20,000 — $30,000."]];
  assumptions.forEach(function(a,i){h+='<div class="disc-assum-row" style="display:flex;gap:24px;padding:14px 0;border-bottom:'+(i<assumptions.length-1?'1px solid rgba(22,32,48,.5)':'none')+'"><div class="disc-assum-label" style="flex:0 0 180px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding-top:2px">'+a[0]+'</div><div style="flex:1;font-size:13px;color:var(--text);line-height:1.7">'+a[1]+'</div></div>';});

  h+='<li style="margin-bottom:10px"><strong style="color:var(--white)">Execution delays and slippage.</strong> Subscriber fills may differ materially from the master account due to network latency, order routing, and market movement between signal generation and execution.</li>';

async function apiCall(method,path,body){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  var token=getToken();
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);

function initDualScrollbars(){
  document.querySelectorAll('.table-wrap').forEach(function(wrap){
    if(wrap.previousElementSibling && wrap.previousElementSibling.classList.contains('table-scroll-top')) return;
    var top=document.createElement('div');
    top.className='table-scroll-top';
    var inner=document.createElement('div');
    inner.style.width=wrap.scrollWidth+'px';
    top.appendChild(inner);
    wrap.parentNode.insertBefore(top,wrap);
    var syncing=false;
    top.addEventListener('scroll',function(){if(!syncing){syncing=true;wrap.scrollLeft=top.scrollLeft;syncing=false;}});
    wrap.addEventListener('scroll',function(){if(!syncing){syncing=true;top.scrollLeft=wrap.scrollLeft;syncing=false;}});
    new ResizeObserver(function(){inner.style.width=wrap.scrollWidth+'px';}).observe(wrap);
  });
}

function fireConfetti(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:99999;pointer-events:none';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var colors=['#00E8A2','#00C4FF','#F0C040','#FF4466','#B070FF','#ffffff'];
  var particles=[];
  for(var i=0;i<120;i++){
    particles.push({
      x:canvas.width*0.5+(Math.random()-0.5)*200,
      y:canvas.height*0.4,
      vx:(Math.random()-0.5)*12,
      vy:-Math.random()*16-4,
      w:Math.random()*8+4,
      h:Math.random()*6+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*12,
      gravity:0.35+Math.random()*0.15,
      opacity:1
    });
  }
  var start=performance.now();
  function tick(now){
    var elapsed=(now-start)/1000;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive=false;
    particles.forEach(function(p){
      p.vy+=p.gravity;
      p.x+=p.vx;
      p.y+=p.vy;
      p.rot+=p.rotV;
      p.vx*=0.99;
      if(elapsed>2)p.opacity=Math.max(0,p.opacity-0.03);
      if(p.opacity<=0||p.y>canvas.height+50)return;
      alive=true;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity;
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if(alive&&elapsed<4){requestAnimationFrame(tick);}
    else{canvas.remove();}
  }
  requestAnimationFrame(tick);
}

  ctx.strokeStyle=divGrad;ctx.beginPath();ctx.moveTo(200,385);ctx.lineTo(880,385);ctx.stroke();

  var yr=now.getFullYear(),mo=now.getMonth();

  var monthStr=yr+'-'+(mo<9?'0':'')+(mo+1);

    if(dd.day.substring(0,7)===monthStr) dayMap[parseInt(dd.day.substring(8,10))]=dd;

  ctx.strokeStyle=divGrad;ctx.beginPath();ctx.moveTo(200,bottomY);ctx.lineTo(880,bottomY);ctx.stroke();

function closeShareModal(){var m=document.getElementById('shareModal');if(m)m.remove();}
function downloadShareCard(){
  var a=document.createElement('a');
  a.href=window._shareImgSrc;
  var now=new Date();
  a.download='NQ_Alpha_'+now.toLocaleString('default',{month:'long'})+'_'+now.getFullYear()+'.png';
  a.click();
}
async function copyShareCard(){
  try{
    var resp=await fetch(window._shareImgSrc);
    var blob=await resp.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    var btn=document.getElementById('copyShareBtn');
    btn.textContent='✓ Copied!';btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
    setTimeout(function(){btn.textContent='Copy to Clipboard';btn.style.borderColor='var(--bd)';btn.style.color='var(--text)';},2000);
  }catch(e){
    // Fallback - just download
    downloadShareCard();
  }
}

// FAQ data
var faqs=[
{cat:'Getting Started',color:'var(--green)',items:[
{q:'What is NQ Alpha?',a:'NQ Alpha is an automated futures trading system that trades Micro E-Mini Nasdaq (MNQ) futures. When you connect your Tradovate account, our system automatically copies every trade to your account in real time — no manual intervention required.'},
{q:'How do I get started?',a:'There are four steps: <strong>1)</strong> Create your account and get approved (usually within 24 hours). <strong>2)</strong> Connect your Tradovate brokerage account using your API credentials. <strong>3)</strong> Set your position size (how many contracts per trade). <strong>4)</strong> Add a payment method. Once connected, trades are copied automatically.'},
{q:'Do I need trading experience?',a:'No. The system is fully automated — you don\'t need to make any trading decisions. However, you should understand that futures trading involves significant risk and you can lose more than your initial investment. Read the Risk Disclosure carefully before connecting a live account.'},
{q:'What are the trading hours?',a:'NQ Alpha trades during the Nasdaq futures session, which runs nearly 24 hours on weekdays (Sunday evening through Friday afternoon CT). There is a brief daily maintenance window. Markets are closed on weekends and major holidays.'},
]},
{cat:'Understanding Futures',color:'var(--gold)',items:[
{q:'What are futures contracts?',a:'Futures are financial contracts that obligate the buyer or seller to transact an asset at a predetermined price on a future date. Unlike stocks, futures use <strong>leverage</strong> — meaning you control a large position with a relatively small amount of capital (called margin). This amplifies both gains and losses.'},
{q:'What is the Micro E-Mini Nasdaq (MNQ)?',a:'The MNQ is a futures contract that tracks the Nasdaq-100 index at <strong>1/10th the size</strong> of the standard E-Mini (NQ). Each point of movement is worth <strong>$2 per contract</strong>. It\'s popular with individual traders because of its smaller size and lower margin requirements compared to the full-size contract.'},
{q:'What is margin in futures trading?',a:'Margin is the amount of capital required to hold a futures position. It\'s not a down payment — it\'s a performance bond. For MNQ, the margin requirement varies by broker but is typically between <strong>$1,000–$2,000 per contract</strong>. If your account falls below the maintenance margin, you\'ll receive a margin call and may need to deposit more funds or have positions liquidated.'},
{q:'What does "going long" vs "going short" mean?',a:'<strong>Going long</strong> means buying a contract with the expectation that the price will rise — you profit when the market goes up. <strong>Going short</strong> means selling a contract expecting the price to fall — you profit when the market goes down. Futures allow you to trade in both directions equally.'},
{q:'What are take-profit and stop-loss orders?',a:'A <strong>take-profit (TP)</strong> is a limit order that automatically closes your position when it reaches a target profit level. A <strong>stop-loss (SL)</strong> is a stop order that closes your position to limit losses if the market moves against you. Every trade placed by NQ Alpha includes both a TP and SL as bracket orders, so exits are handled automatically.'},
{q:'How much can I lose on a single trade?',a:'Your maximum loss per trade depends on the stop-loss distance and the number of contracts you\'re trading. For example, if the stop-loss is 65 points away and you\'re trading 2 MNQ contracts, the max loss would be 65 × $2 × 2 = <strong>$260</strong>. This is set before the trade is placed — there are no surprises.'},
]},
{cat:'Position Sizing',color:'var(--cyan)',items:[
{q:'How many contracts will I trade?',a:'You control this in the Connect tab. You can choose <strong>Multiplier mode</strong> (a percentage of the master account) or <strong>Fixed mode</strong> (always trade a set number of contracts). The minimum is always 1 contract.'},
{q:'What position size should I start with?',a:'Start conservative. A good rule of thumb is to risk no more than <strong>1–2% of your account</strong> on any single trade. If your account is $10,000 and max loss per contract is around $130, that\'s roughly 1 contract. You can always increase later once you\'re comfortable with the system.'},
{q:'Can I change my position size?',a:'Yes, anytime. Go to the <strong>Connect</strong> tab and change your contract count. Changes take effect on the next trade — any open positions will keep their original size.'},
{q:'What\'s the difference between Multiplier and Fixed mode?',a:'<strong>Multiplier mode</strong> scales your contracts as a percentage of the master account. If the master trades more contracts, your size scales up proportionally. <strong>Fixed mode</strong> always trades the exact number of contracts you specify, regardless of what the master does. Fixed mode gives you more predictable risk.'},
]},
{cat:'Tradovate Connection',color:'var(--green)',items:[
{q:'How do I get Tradovate API credentials?',a:'<strong>1)</strong> Log in to <a href="https://trader.tradovate.com" target="_blank" style="color:var(--cyan)">trader.tradovate.com</a>. <strong>2)</strong> Go to <strong>Settings → API Access</strong>. <strong>3)</strong> Create a new API key — you\'ll get a <em>Username</em>, <em>App ID</em>, <em>CID</em>, and <em>API Secret</em>. <strong>4)</strong> Copy all four values into the Connect tab in your NQ Alpha dashboard. Your password is your Tradovate account password.'},
{q:'Should I use Demo or Live mode?',a:'We recommend starting on <strong>Demo</strong> to see the system in action with paper money. Once you\'re comfortable, switch to <strong>Live</strong> to trade with real capital. You can switch between modes at any time from the Connect tab.'},
{q:'Are my Tradovate credentials secure?',a:'Yes. Your credentials are encrypted at rest using AES-256 encryption before being stored. They are only decrypted in memory when the trade copier needs to execute a trade on your behalf. We never store plaintext passwords.'},
{q:'What happens if my connection drops?',a:'If your Tradovate session expires or disconnects, the copier automatically attempts to reconnect every 60 seconds. If it can\'t reconnect, no trades will be placed on your account until the connection is restored. You\'ll see your connection status on the Overview tab.'},
{q:'Do I need a funded Tradovate account?',a:'For <strong>Demo mode</strong>, no — Tradovate provides a simulated account with paper money. For <strong>Live mode</strong>, yes — you\'ll need a funded account with enough margin to cover your position size. Check with Tradovate for their current margin requirements on MNQ contracts.'},
]},
{cat:'Billing & Fees',color:'var(--cyan)',items:[
{q:'How does billing work?',a:'NQ Alpha has two components: <strong>1) A one-time access fee</strong> of $2,500 per product (MNQ and/or MES — $5,000 for both). <strong>2) A $1,000/month flat subscription</strong> that starts automatically when you connect a live Tradovate account. Your first charge is 30 days after going live — giving you time to see profits before paying. Demo mode is completely free — test as long as you want. If the bot has zero or negative profit in a given month, you won\'t be charged.'},
{q:'What are the one-time product fees?',a:'Each product (MNQ or MES) requires a <strong>$2,500 one-time access fee</strong> to unlock. You can purchase one or both. This fee grants you permanent access to that product\'s trading strategies. The $5,000 bundle gets you both MNQ and MES access.'},
{q:'What if the bot loses money?',a:'If the bot has zero or negative profit for a billing month, <strong>you don\'t pay anything</strong> for that month. You only pay the $1,000 subscription when the bot is profitable. We believe in aligning our success with yours.'},
{q:'What happens if I disconnect early?',a:'If you disconnect your live Tradovate account at any point, the <strong>$1,000 subscription fee is still owed</strong> and will be charged immediately to your card on file. This applies whether you disconnect on day 1 or day 29. After the first 30 days, your subscription renews monthly and you can cancel anytime with no additional charges.'},
{q:'Can I cancel anytime?',a:'Yes. You can disconnect your Tradovate account and cancel your subscription at any time. The one-time product access fees are non-refundable. There are no lock-in contracts or cancellation fees on the monthly subscription.'},
{q:'Do you offer promo codes?',a:'Yes! If you have a promo code, you can apply it in the <strong>Billing</strong> tab. Promos can include free product access, subscription discounts, or both. Each investor can only use one promo code.'},
{q:'Is my payment information secure?',a:'All payments are handled by <strong>Stripe</strong>, a PCI-compliant payment processor. NQ Alpha never sees or stores your full card number. All checkout happens securely through Stripe\'s hosted payment page.'},
]},
{cat:'Account & Support',color:'var(--gold)',items:[
{q:'How do I update my profile?',a:'Go to the <strong>Settings</strong> tab in your dashboard. You can update your name and phone number. Email changes require contacting support.'},
{q:'What if I forget my password?',a:'Contact support at <a href="mailto:nqalphaceo@gmail.com" style="color:var(--cyan)">nqalphaceo@gmail.com</a> to reset your password. We\'re working on adding self-service password reset soon.'},
{q:'How do I contact support?',a:'Email <a href="mailto:nqalphaceo@gmail.com" style="color:var(--cyan)">nqalphaceo@gmail.com</a> for any questions, issues, or feedback. We aim to respond within 24 hours.'},
{q:'What does the "My Journey" tab track?',a:'My Journey is your personal achievement tracker. It automatically unlocks milestones as you trade — first win, win streaks, P&L milestones, and more. You can share achievement cards on social media directly from the tab.'},
]},
];

function drawLiveEqChart(){
  var c=document.getElementById('liveEqChart');if(!c)return;
  var data=window._pnlEqCurve||[];if(data.length<2)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
  var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=220*dpr;x.scale(dpr,dpr);
  var W=r.width,H=220;
  var vals=data.map(function(d){return d.cumulative;});
  var mn=Math.min.apply(null,vals.concat([0])),mx=Math.max.apply(null,vals);
  var rng=mx-mn||1;
  var pad={t:20,r:80,b:30,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

  // Grid lines
  x.strokeStyle='#182030';x.lineWidth=0.5;
  for(var i=0;i<=5;i++){
    var y=pad.t+(ch/5)*i;
    x.beginPath();x.moveTo(pad.l,y);x.lineTo(W-pad.r,y);x.stroke();
    var v=mx-(rng/5)*i;
    x.fillStyle='#3d5570';x.font='10px DM Mono';x.textAlign='right';
    x.fillText((v>=0?'+':'')+fmtD(Math.round(v)),W-pad.r+70,y+4);
  }

  // Zero line
  if(mn<0){
    var zy=pad.t+((mx-0)/rng)*ch;
    x.strokeStyle='#3d5570';x.setLineDash([4,4]);
    x.beginPath();x.moveTo(pad.l,zy);x.lineTo(W-pad.r,zy);x.stroke();
    x.setLineDash([]);
  }

  // Area fill
  x.beginPath();
  for(var i=0;i<vals.length;i++){
    var px=pad.l+(i/(vals.length-1))*cw;
    var py=pad.t+((mx-vals[i])/rng)*ch;
    if(i===0)x.moveTo(px,py);else x.lineTo(px,py);
  }
  x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
  var last=vals[vals.length-1];
  var gColor=last>=0?'0,232,162':'255,68,102';
  var g=x.createLinearGradient(0,pad.t,0,H);
  g.addColorStop(0,'rgba('+gColor+',0.15)');g.addColorStop(1,'rgba('+gColor+',0)');
  x.fillStyle=g;x.fill();

  // Line
  x.beginPath();
  for(var i=0;i<vals.length;i++){
    var px=pad.l+(i/(vals.length-1))*cw;
    var py=pad.t+((mx-vals[i])/rng)*ch;
    if(i===0)x.moveTo(px,py);else x.lineTo(px,py);
  }
  x.strokeStyle=last>=0?'#00E8A2':'#FF4466';x.lineWidth=2;x.stroke();

  // End dot
  var lx=pad.l+cw;var ly=pad.t+((mx-last)/rng)*ch;
  x.beginPath();x.arc(lx,ly,5,0,Math.PI*2);
  x.fillStyle=last>=0?'#00E8A2':'#FF4466';x.fill();
  x.beginPath();x.arc(lx,ly,5,0,Math.PI*2);
  x.strokeStyle='#04080D';x.lineWidth=2;x.stroke();

  // Hover interaction
  c.onmousemove=function(e){
    var rect=c.getBoundingClientRect();var rx=e.clientX-rect.left-pad.l;
    var idx=Math.round((rx/cw)*(vals.length-1));
    if(idx<0||idx>=vals.length){drawLiveEqChart();return;}
    drawLiveEqChart();
    var hx=pad.l+(idx/(vals.length-1))*cw;
    var hy=pad.t+((mx-vals[idx])/rng)*ch;
    // Crosshair
    x.strokeStyle='rgba(0,232,162,0.25)';x.lineWidth=1;x.setLineDash([3,3]);
    x.beginPath();x.moveTo(hx,pad.t);x.lineTo(hx,pad.t+ch);x.stroke();x.setLineDash([]);
    // Dot
    x.beginPath();x.arc(hx,hy,6,0,Math.PI*2);x.fillStyle='rgba(0,232,162,0.15)';x.fill();
    x.beginPath();x.arc(hx,hy,4,0,Math.PI*2);x.fillStyle=vals[idx]>=0?'#00E8A2':'#FF4466';x.fill();
    x.beginPath();x.arc(hx,hy,4,0,Math.PI*2);x.strokeStyle='#04080D';x.lineWidth=1.5;x.stroke();
    // Label
    var d=data[idx];
    x.fillStyle=vals[idx]>=0?'#00E8A2':'#FF4466';x.font='bold 12px DM Mono';x.textAlign='center';
    x.fillText((vals[idx]>=0?'+':'')+fmtD(vals[idx]),hx,hy-14);
    x.fillStyle='#405060';x.font='9px DM Mono';
    x.fillText(d.strategy+' '+d.result,hx,hy-28);
  };
  c.onmouseleave=function(){drawLiveEqChart();};
}

function drawDailyPnlChart(){
  var c=document.getElementById('dailyPnlChart');if(!c)return;
  var data=window._pnlDailyPnl||[];if(data.length===0)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
  var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=180*dpr;x.scale(dpr,dpr);
  var W=r.width,H=180;
  var vals=data.map(function(d){return d.pnl;});
  var absMax=Math.max.apply(null,vals.map(Math.abs));if(absMax===0)absMax=1;
  var pad={t:10,r:10,b:24,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var barW=Math.max(2,Math.min(24,(cw/vals.length)-2));
  var midY=pad.t+ch/2;

  // Zero line
  x.strokeStyle='#2a3545';x.lineWidth=1;
  x.beginPath();x.moveTo(pad.l,midY);x.lineTo(W-pad.r,midY);x.stroke();

  // Bars
  for(var i=0;i<vals.length;i++){
    var bx=pad.l+(i/(vals.length))*(cw-barW);
    var v=vals[i];
    var barH=Math.abs(v)/absMax*(ch/2-4);
    if(barH<1)barH=1;
    var by=v>=0?midY-barH:midY;
    var col=v>=0?'#00E8A2':'#FF4466';
    x.fillStyle=col+'90';
    x.beginPath();
    // Rounded rect
    var radius=Math.min(3,barW/2);
    x.moveTo(bx+radius,by);
    x.lineTo(bx+barW-radius,by);
    x.quadraticCurveTo(bx+barW,by,bx+barW,by+radius);
    x.lineTo(bx+barW,by+barH-radius);
    x.quadraticCurveTo(bx+barW,by+barH,bx+barW-radius,by+barH);
    x.lineTo(bx+radius,by+barH);
    x.quadraticCurveTo(bx,by+barH,bx,by+barH-radius);
    x.lineTo(bx,by+radius);
    x.quadraticCurveTo(bx,by,bx+radius,by);
    x.fill();
  }

  // Date labels (first, middle, last)
  x.fillStyle='#405060';x.font='9px DM Mono';x.textAlign='center';
  if(data.length>0){
    x.textAlign='left';
    x.fillText(data[0].day,pad.l,H-4);
  }
  if(data.length>2){
    var mi=Math.floor(data.length/2);
    x.textAlign='center';
    x.fillText(data[mi].day,W/2,H-4);
  }
  if(data.length>1){
    x.textAlign='right';
    x.fillText(data[data.length-1].day,W-pad.r,H-4);
  }

  // Hover
  c.onmousemove=function(e){
    var rect=c.getBoundingClientRect();var rx=e.clientX-rect.left-pad.l;
    var idx=Math.floor((rx/cw)*vals.length);
    if(idx<0||idx>=vals.length){drawDailyPnlChart();return;}
    drawDailyPnlChart();
    var bx=pad.l+(idx/(vals.length))*(cw-barW);
    var v=vals[idx];var d=data[idx];
    // Highlight bar
    var barH=Math.abs(v)/absMax*(ch/2-4);if(barH<1)barH=1;
    var by=v>=0?midY-barH:midY;
    x.fillStyle=v>=0?'#00E8A2':'#FF4466';
    x.fillRect(bx,by,barW,barH);
    // Tooltip
    x.fillStyle='#fff';x.font='bold 11px DM Mono';x.textAlign='center';
    var tx=bx+barW/2;var ty=v>=0?by-18:by+barH+16;
    x.fillText((v>=0?'+':'')+fmtD(v),tx,ty);
    x.fillStyle='#607080';x.font='9px DM Mono';
    x.fillText(d.day+' · '+d.trades+'T · '+d.wins+'W',tx,ty+(v>=0?-12:12));
  };
  c.onmouseleave=function(){drawDailyPnlChart();};
}

function drawDashEq(){
var c=document.getElementById('dashEq');if(!c)return;
var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=180*dpr;x.scale(dpr,dpr);
var W=r.width,H=180,data=D.eq;
var mn=Math.min.apply(null,data.concat([0])),mx=Math.max.apply(null,data),rng=mx-mn||1;
var pad={t:10,r:10,b:10,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();
}

async function doAdminLogin(){
  var pass=document.getElementById('adminPass').value;
  var err=document.getElementById('adminLoginErr');
  err.style.display='none';
  if(!pass){err.textContent='Enter your admin password.';err.style.display='block';return;}
  var btn=event.target||document.querySelector('#adminPage button');
  btn.textContent='Signing in...';btn.disabled=true;
  try{
    var data=await fetch(API+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})}).then(r=>r.json());
    if(data.token){
      ADMIN_KEY_STORED=data.token;
      localStorage.setItem('nq_admin_token',data.token);
      await buildAdminDash();
    } else {
      err.textContent='Invalid password.';err.style.display='block';
    }
  }catch(e){err.textContent='Invalid password.';err.style.display='block';}

async function adminApi(method,path,body){
  var token=ADMIN_KEY_STORED||localStorage.getItem('nq_admin_token');
  var opts={method:method,headers:{'Content-Type':'application/json','x-admin-key':token}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(API+path,opts);
  var data=await res.json();
  if(!res.ok)throw new Error(data.detail||'Request failed');
  return data;
}

function renderMasterTradePage(page){

  slice.forEach(function(t){

    else resultBadge='<span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(0,196,255,.08);color:var(--cyan)">OPEN</span>';

    var pnlCol=t.pnl>0?'var(--green)':t.pnl<0?'var(--red)':'var(--muted)';

    h+='<tr>';

    h+='<td><span style="padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;'+(connected?(isLive?'background:rgba(255,68,102,.08);color:var(--red)':'background:rgba(240,192,64,.08);color:var(--gold)'):'background:rgba(64,80,96,.15);color:var(--muted)')+'">'+( connected?(isLive?'LIVE':'DEMO'):'—')+'</span></td>';
    h+='<td style="color:var(--muted);font-family:var(--mono);font-size:10px">'+liveSince+'</td>';
    h+='<td style="color:var(--text);font-family:var(--mono);font-size:11px">'+pos+'</td>';
    h+='<td style="color:'+(pnl>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(pnl>=0?'+':'')+fmtD(pnl)+'</td>';
    h+='<td><div style="display:flex;gap:6px">';
    if(!approved){
      h+='<button onclick="adminAction(\'approve\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 14px;background:var(--green);border:none;border-radius:6px;color:var(--bg);font-weight:700;cursor:pointer">APPROVE</button>';
    } else {
      if(connected){
        h+='<button onclick="adminAction(\'pause\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 12px;background:transparent;border:1px solid rgba(240,192,64,.3);border-radius:6px;color:var(--gold);cursor:pointer" title="Pause trade copying">⏸ PAUSE</button>';
      } else if(inv.tv_username){
        h+='<button onclick="adminAction(\'resume\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 12px;background:transparent;border:1px solid rgba(0,232,162,.3);border-radius:6px;color:var(--green);cursor:pointer" title="Resume trade copying">▶ RESUME</button>';
      }
      h+='<button onclick="adminAction(\'revoke\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 14px;background:transparent;border:1px solid rgba(255,68,102,.25);border-radius:6px;color:var(--red);cursor:pointer">REVOKE</button>';
    }
    h+='<button onclick="adminAction(\'delete\','+inv.id+')" style="font-family:var(--mono);font-size:10px;padding:5px 10px;background:transparent;border:1px solid var(--bd);border-radius:6px;color:var(--muted);cursor:pointer">✕</button>';
    h+='</div></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

async function adminAction(action, investorId){
  if(action==='delete' && !confirm('Permanently delete this investor? This cannot be undone.')) return;
  if(action==='revoke' && !confirm('Revoke this investor\'s access?')) return;
  if(action==='pause' && !confirm('Pause trade copying for this investor? They stay approved but no trades will be copied.')) return;
  try{
    if(action==='approve') await adminApi('POST','/admin/approve/'+investorId);
    else if(action==='revoke') await adminApi('POST','/admin/revoke/'+investorId);
    else if(action==='delete') await adminApi('DELETE','/admin/investor/'+investorId);
    else if(action==='pause') await adminApi('POST','/admin/pause/'+investorId);
    else if(action==='resume') await adminApi('POST','/admin/resume/'+investorId);
    await renderAdminContent();
  }catch(e){alert('Error: '+e.message);}
}

        } else {
          msg+=r.name+': $'+r.balance.toLocaleString()+' (Open P&L: $'+r.unrealized.toLocaleString()+')\n';
        }
      });
      alert(msg);
      await switchAdminTab('health');

  if(btn){btn.textContent='💰 Refresh Balances';btn.disabled=false;}
}

// ─── PROMO CODE MANAGEMENT ──────────────────────────────────────────
async function reconcileTrades(){
  var btn=document.getElementById('reconcileBtn');
  if(btn){btn.textContent='⏳ Reconciling...';btn.disabled=true;}
  try{
    var result=await adminApi('POST','/admin/reconcile-trades',{});
    if(result.success){
      var msg='';
      var dupes=result.duplicates_removed||0;
      if(result.fixed>0||dupes>0){
        msg+='✅ Reconciliation Complete:\n\n';
        if(dupes>0) msg+='🗑 Removed '+dupes+' duplicate investor trades\n\n';
        // Master changes
        if(result.master&&result.master.changes&&result.master.changes.length>0){
          msg+='MASTER:\n';
          result.master.changes.forEach(function(c){
            msg+='  #'+c.trade_id+' '+c.strategy+': $'+c.old_pnl+' → $'+c.new_pnl+'\n';
          });
        }
        // Follower changes
        if(result.followers){
          result.followers.forEach(function(f){
            if(f.changes&&f.changes.length>0){
              msg+='\n'+f.investor_name+':\n';
              f.changes.forEach(function(c){
                msg+='  #'+c.trade_id+': $'+c.old_pnl+' → $'+c.new_pnl+'\n';
              });
            }
          });
        }
        if(!msg.includes('MASTER')&&!msg.includes(':\n  #')) msg+='All P&L values match Tradovate\n';
        alert(msg);
      } else {
        var masterMatch=result.master?result.master.matched:0;
        var followerMatch=result.followers?result.followers.reduce(function(a,f){return a+f.matched;},0):0;
        alert('✅ All trades match Tradovate\n\nMaster: '+masterMatch+' matched\nFollowers: '+followerMatch+' matched');
      }
      await switchAdminTab('master');
    } else {
      alert('Error: '+(result.error||'Unknown error'));
    }
  }catch(e){alert('Error: '+e.message);}
  if(btn){btn.textContent='⚡ Reconcile P&L';btn.disabled=false;}
}

async function createPromoCode(){
  var code=(document.getElementById('promoNewCode')||{}).value||'';
  var desc=(document.getElementById('promoNewDesc')||{}).value||'';
  var mnqFree=parseInt((document.getElementById('promoNewMnq')||{}).value||0);
  var mesFree=parseInt((document.getElementById('promoNewMes')||{}).value||0);
  var discount=parseInt((document.getElementById('promoNewDiscount')||{}).value||0);
  var maxUses=parseInt((document.getElementById('promoNewMax')||{}).value||10);
  var msg=document.getElementById('promoCreateMsg');
  if(!code.trim()){if(msg){msg.style.display='block';msg.style.color='var(--red)';msg.style.background='rgba(255,68,102,.08)';msg.textContent='Enter a promo code';}return;}
  try{
    await adminApi('POST','/api/admin/promo/create',{code:code.trim(),description:desc,mnq_free:mnqFree,mes_free:mesFree,sub_discount_pct:discount,max_uses:maxUses});
    if(msg){msg.style.display='block';msg.style.color='var(--green)';msg.style.background='rgba(0,232,162,.08)';msg.textContent='✓ Promo code '+code.toUpperCase()+' created';}
    setTimeout(function(){switchAdminTab('promos');},800);
  }catch(e){if(msg){msg.style.display='block';msg.style.color='var(--red)';msg.style.background='rgba(255,68,102,.08)';msg.textContent='Error: '+e.message;}}
}

async function editPromoMax(code,currentMax){
  var newMax=prompt('New max uses for '+code+' (current: '+(currentMax>0?currentMax:'unlimited')+', -1 = unlimited):',currentMax);
  if(newMax===null)return;
  newMax=parseInt(newMax);
  if(isNaN(newMax))return;
  try{
    await adminApi('PUT','/api/admin/promo/update',{code:code,max_uses:newMax});
    await switchAdminTab('promos');
  }catch(e){alert('Error: '+e.message);}
}
