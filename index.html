<style>
:root{--bg:#04080D;--sf:#0A1018;--sf2:#0E1620;--bd:#162030;--green:#00E8A2;--cyan:#00C4FF;--gold:#F0C040;--red:#FF4466;--text:#B8C8D8;--muted:#405060;--white:#F0F4F8;--font:'Outfit',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);}
::selection{background:rgba(0,232,162,.2);color:var(--white);}
input::placeholder{color:var(--muted);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.page{display:none;}.page.active{display:block;}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(4,8,13,.92);backdrop-filter:blur(12px);z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 14px rgba(0,232,162,.4);animation:pulse 2s ease infinite;}
.logo-text{font-size:18px;font-weight:800;color:var(--white);letter-spacing:-.5px;}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;margin-left:4px;}
.btn{font-family:var(--mono);font-size:11px;padding:10px 28px;background:transparent;border:1px solid var(--bd);border-radius:8px;color:var(--text);cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--green);color:var(--green);}
.btn-primary{background:var(--green);border:none;color:var(--bg);font-family:var(--font);font-weight:700;font-size:14px;padding:14px 36px;border-radius:10px;}
.btn-primary:hover{transform:translateY(-2px);}
.btn-ghost{font-family:var(--mono);font-size:12px;padding:14px 32px;background:transparent;border:1px solid var(--bd);border-radius:10px;color:var(--text);cursor:pointer;}

.hero{text-align:center;padding:100px 40px 60px;position:relative;overflow:hidden;}
.hero:before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:1000px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,232,162,.04) 0%,transparent 70%);pointer-events:none;}
.hero-tag{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:4px;margin-bottom:20px;animation:fadeUp .6s ease both;}
.hero h1{font-size:60px;font-weight:900;color:var(--white);letter-spacing:-3px;line-height:1.05;margin-bottom:20px;animation:fadeUp .6s ease .1s both;}
.hero h1 span{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:17px;color:rgba(184,200,216,.8);max-width:560px;margin:0 auto 48px;line-height:1.75;animation:fadeUp .6s ease .2s both;}
.hero-btns{display:flex;gap:16px;justify-content:center;animation:fadeUp .6s ease .3s both;}

.main{max-width:1100px;margin:0 auto;padding:0 40px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px;}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}

.stat{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:22px 26px;animation:fadeUp .6s ease both;transition:border-color .3s,transform .3s;}
.stat:hover{border-color:rgba(0,232,162,.25);transform:translateY(-2px);}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase;}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-1px;}
.stat-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:28px;margin-bottom:48px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.card-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;}
.card-subtitle{font-size:16px;font-weight:600;color:var(--white);margin-top:6px;}
.card-value{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);text-align:right;}
.card-hint{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;text-align:right;}

.yr-card{text-align:center;padding:20px;background:var(--sf2);border-radius:12px;border:1px solid var(--bd);transition:all .3s;cursor:default;}
.yr-card:hover{border-color:rgba(0,232,162,.25);transform:translateY(-3px);}
.yr-card .year{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px;}
.yr-card .val{font-size:24px;font-weight:700;color:var(--green);}
.yr-card .pct{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:6px;}

.strat-card{background:var(--sf);border-radius:16px;border:1px solid var(--bd);overflow:hidden;transition:all .3s;}
.strat-card:hover{transform:translateY(-4px);}
.strat-bar{height:3px;}
.strat-body{padding:24px 24px 20px;}
.strat-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.strat-icon{font-size:18px;}
.strat-name{font-size:20px;font-weight:700;color:var(--white);}
.strat-tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;margin-bottom:16px;}
.strat-desc{font-size:13px;color:rgba(184,200,216,.8);line-height:1.7;margin-bottom:20px;min-height:80px;}
.strat-stats{background:var(--sf2);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ss-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;}
.ss-val{font-size:18px;font-weight:700;color:var(--white);margin-top:2px;}

.chars{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.char{text-align:center;}
.char-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.char-val{font-size:22px;font-weight:700;}
.char-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;}

.cta{text-align:center;padding:48px 0 80px;}
.cta-tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:16px;}
.cta h2{font-size:32px;font-weight:800;color:var(--white);margin-bottom:12px;}
.cta p{font-size:14px;color:var(--muted);max-width:460px;margin:0 auto 32px;}
.cta .fee{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px;}

.footer{border-top:1px solid var(--bd);padding:28px 40px;text-align:center;}
.footer p{font-family:var(--mono);font-size:9px;color:var(--muted);line-height:2;max-width:700px;margin:0 auto;}

/* Monthly bars */
.mb-wrap{position:relative;}.mb-tip{position:absolute;top:-44px;transform:translateX(-50%);background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;white-space:nowrap;z-index:10;box-shadow:0 4px 16px rgba(4,8,13,.8);display:none;pointer-events:none;}
.mb-row{display:flex;align-items:flex-end;gap:2px;height:130px;padding:0 2px;}
.mb-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;cursor:crosshair;}
.mb-fill{border-radius:2px 2px 0 0;transition:all .15s;transform-origin:bottom;}
.mb-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:10px;}
.mb-legend{display:flex;gap:16px;font-family:var(--mono);font-size:10px;}

/* Chart tooltip */
.eq-tip{position:absolute;top:8px;pointer-events:none;z-index:10;display:none;}
.eq-tip-inner{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;box-shadow:0 8px 24px rgba(4,8,13,.87);}
.eq-tip .month{font-family:var(--mono);font-size:10px;color:var(--muted);}
.eq-tip .val{font-size:18px;font-weight:700;margin-top:2px;}
.eq-tip .chg{font-family:var(--mono);font-size:10px;margin-top:2px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{width:420px;animation:fadeUp .4s ease both;}
.login-logo{text-align:center;margin-bottom:36px;cursor:pointer;}
.login-form{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:36px;}
.login-toggle{display:flex;gap:0;margin-bottom:32px;background:var(--sf2);border-radius:10px;padding:3px;}
.login-toggle button{flex:1;padding:11px 0;border-radius:8px;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:1px;transition:all .2s;}
.login-toggle .active{background:var(--bd);color:var(--white);}
.login-toggle .inactive{background:transparent;color:var(--muted);}
.field{margin-bottom:16px;}
.field label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--white);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--cyan);}
.login-submit{width:100%;padding:14px;background:var(--green);border:none;border-radius:10px;color:var(--bg);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.login-back{text-align:center;margin-top:20px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;}
.login-back:hover{color:var(--cyan);}

/* DASHBOARD */
.dash{display:flex;max-width:1200px;margin:0 auto;padding:24px 32px;gap:24px;}
.dash-side{width:180px;flex-shrink:0;}
.dash-tab{display:block;width:100%;text-align:left;padding:11px 16px;margin-bottom:4px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;transition:all .15s;background:transparent;color:var(--muted);}
.dash-tab.active{background:rgba(0,232,162,.06);color:var(--green);}
.dash-main{flex:1;}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.dash-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:22px;}
.dc-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.dc-val{font-size:28px;font-weight:700;margin-top:8px;}
.dc-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;}

table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
th{padding:12px 14px;text-align:left;color:var(--muted);font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--bd);}
td{padding:12px 14px;}
.badge-tp{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(0,232,162,.08);color:var(--green);}
.badge-pending{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(240,192,64,.08);color:var(--gold);}
.pay-btn{font-family:var(--mono);font-size:10px;padding:6px 18px;background:var(--green);border:none;border-radius:6px;color:var(--bg);font-weight:700;cursor:pointer;}

.conn-box{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:28px;max-width:480px;}
.conn-ok{background:rgba(0,232,162,.04);border:1px solid rgba(0,232,162,.15);border-radius:14px;padding:28px;text-align:center;}
.warn-box{background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.15);border-radius:8px;padding:12px;margin-bottom:16px;font-family:var(--mono);font-size:11px;color:var(--gold);line-height:1.7;}
.how-box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:22px;}
.how-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:14px;}
.how-item{font-size:13px;color:var(--text);line-height:1.9;margin-bottom:6px;}
.how-item strong{color:var(--white);}

@media(max-width:768px){
  nav{padding:16px 20px;}
  .hero{padding:60px 20px 40px;}
  .hero h1{font-size:36px;letter-spacing:-1.5px;}
  .hero p{font-size:14px;}
  .hero-btns{flex-direction:column;align-items:center;}
  .main{padding:0 16px;}
  .grid4,.chars{grid-template-columns:repeat(2,1fr);gap:10px;}
  .grid6{grid-template-columns:repeat(3,1fr);gap:8px;}
  .grid3{grid-template-columns:1fr;gap:14px;}
  .card{padding:16px;margin-bottom:28px;}
  .cta h2{font-size:24px;}
  .footer{padding:20px 16px;}

// ═══ EQUITY CHART ═══
function drawEqChart(){
  var c=document.getElementById('eqChart');if(!c)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
  var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=300*dpr;x.scale(dpr,dpr);
  var W=r.width,H=300,data=D.eq;
  var mn=Math.min.apply(null,data.concat([0])),mx=Math.max.apply(null,data),rng=mx-mn||1;
  var pad={t:20,r:80,b:30,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  // Grid
  x.strokeStyle='#182030';x.lineWidth=0.5;
  for(var i=0;i<=5;i++){var y=pad.t+(ch/5)*i;x.beginPath();x.moveTo(pad.l,y);x.lineTo(W-pad.r,y);x.stroke();var v=mx-(rng/5)*i;x.fillStyle='#3d5570';x.font='10px DM Mono';x.textAlign='right';x.fillText('$'+fmt(v),W-pad.r+70,y+4);}
  // Zero
  var zy=pad.t+((mx-0)/rng)*ch;x.strokeStyle='#3d5570';x.setLineDash([4,4]);x.beginPath();x.moveTo(pad.l,zy);x.lineTo(W-pad.r,zy);x.stroke();x.setLineDash([]);
  // Fill
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
  var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
  // Line
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();
  // End label
  var last=data[data.length-1],ly=pad.t+((mx-last)/rng)*ch;
  x.fillStyle='#00E8A2';x.font='bold 13px DM Mono';x.textAlign='right';x.fillText(fmtD(last),W-pad.r-6,ly-10);

  // Hover
  c.onmousemove=function(e){
    var rect=c.getBoundingClientRect();var rx=e.clientX-rect.left-pad.l;
    var idx=Math.round((rx/cw)*(data.length-1));
    if(idx<0||idx>=data.length){document.getElementById('eqTip').style.display='none';drawEqChart();return;}
    drawEqChart();// redraw base
    var hx=pad.l+(idx/(data.length-1))*cw;var hy=pad.t+((mx-data[idx])/rng)*ch;
    // Crosshair
    x.strokeStyle='rgba(0,232,162,0.3)';x.lineWidth=1;x.setLineDash([3,3]);
    x.beginPath();x.moveTo(hx,pad.t);x.lineTo(hx,pad.t+ch);x.stroke();x.setLineDash([]);
    x.beginPath();x.arc(hx,hy,6,0,Math.PI*2);x.fillStyle='rgba(0,232,162,0.15)';x.fill();
    x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.fillStyle='#00E8A2';x.fill();
    x.beginPath();x.arc(hx,hy,3.5,0,Math.PI*2);x.strokeStyle='#04080D';x.lineWidth=1.5;x.stroke();
    // Tooltip
    var tip=document.getElementById('eqTip');tip.style.display='block';
    tip.style.left=Math.min(e.clientX-rect.left,rect.width-180)+'px';
    document.getElementById('tipMonth').textContent=fmtM(idx);
    document.getElementById('tipVal').textContent=fmtD(data[idx]);
    document.getElementById('tipVal').style.color=data[idx]>=0?'#00E8A2':'#FF4466';
    if(idx>0){var chg=data[idx]-data[idx-1];document.getElementById('tipChg').textContent=(chg>=0?'+':'')+fmtD(chg)+' this month';document.getElementById('tipChg').style.color=chg>=0?'#00E8A2':'#FF4466';document.getElementById('tipChg').style.display='block';}else{document.getElementById('tipChg').style.display='none';}
  };
  c.onmouseleave=function(){document.getElementById('eqTip').style.display='none';drawEqChart();};
  c.ontouchmove=c.onmousemove;
}

function animateNumbers(){
  var dur=1200,s=performance.now();
  function tick(now){
    var t=Math.min((now-s)/dur,1);var ease=1-Math.pow(1-t,3);
    var el1=document.getElementById('animPnl');if(el1)el1.textContent='$'+Math.round(1450896*ease).toLocaleString();

  }
  requestAnimationFrame(tick);
}

function drawDashEq(){
  var c=document.getElementById('dashEq');if(!c)return;
  var x=c.getContext('2d');var dpr=window.devicePixelRatio||1;
  var r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=180*dpr;x.scale(dpr,dpr);
  var W=r.width,H=180,data=D.eq;
  var mn=Math.min.apply(null,data.concat([0])),mx=Math.max.apply(null,data),rng=mx-mn||1;
  var pad={t:10,r:10,b:10,l:10},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.lineTo(pad.l+cw,pad.t+ch);x.lineTo(pad.l,pad.t+ch);x.closePath();
  var g=x.createLinearGradient(0,pad.t,0,H);g.addColorStop(0,'rgba(0,232,162,0.12)');g.addColorStop(1,'rgba(0,232,162,0)');x.fillStyle=g;x.fill();
  x.beginPath();for(var i=0;i<data.length;i++){var px=pad.l+(i/(data.length-1))*cw;var py=pad.t+((mx-data[i])/rng)*ch;if(i===0)x.moveTo(px,py);else x.lineTo(px,py);}
  x.strokeStyle='#00E8A2';x.lineWidth=2;x.stroke();
}
